name: Update Tailscale DERP Rules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # python env
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install deps
        run: pip install requests PyYAML

      # =========================
      # generate derp
      # =========================
      - name: Generate DERP file
        run: python update_derp.py

      # =========================
      # load old version
      # =========================
      - name: Load previous file
        run: |
          git show HEAD~1:tailscale_derp.yaml > old.yaml || echo "Regions: {}" > old.yaml

      # =========================
      # changelog + release body
      # =========================
      - name: Generate changelog
        run: |
          python3 << 'EOF'
import yaml

def load(p):
    try:
        return yaml.safe_load(open(p)) or {}
    except:
        return {}

old = load("old.yaml")
new = load("tailscale_derp.yaml")

def index(d):
    m = {}
    for r in d.get("Regions", {}).values():
        for n in r.get("Nodes", []):
            h = n.get("HostName")
            if h:
                m[h] = n
    return m

old_m = index(old)
new_m = index(new)

old_h = set(old_m)
new_h = set(new_m)

added = new_h - old_h
removed = old_h - new_h
common = old_h & new_h

changed = []
for h in common:
    o = old_m[h]
    n = new_m[h]
    if (o.get("IPv4"), o.get("IPv6")) != (n.get("IPv4"), n.get("IPv6")):
        changed.append(h)

def fmt(hosts, m):
    return "\n".join(
        f"- {h} | {m[h].get('IPv4')} | {m[h].get('IPv6')}"
        for h in sorted(hosts)
    ) or "- None"

summary = {
    "added": len(added),
    "removed": len(removed),
    "changed": len(changed),
    "total": len(new_h),
}

with open("CHANGELOG.md", "w") as f:
    f.write("# DERP Update\n\n")
    f.write("## Summary\n")
    f.write(f"- Added: {summary['added']}\n")
    f.write(f"- Removed: {summary['removed']}\n")
    f.write(f"- IP Changed: {summary['changed']}\n")
    f.write(f"- Total nodes: {summary['total']}\n\n")

    f.write("## Added\n")
    f.write(fmt(added, new_m) + "\n\n")

    f.write("## Removed\n")
    f.write(fmt(removed, old_m) + "\n\n")

    f.write("## IP Changed\n")
    f.write(fmt(changed, new_m) + "\n")

with open("release_body.txt", "w") as f:
    f.write("DERP Update\n\n")
    f.write("## Summary\n")
    f.write(f"- Added: {summary['added']}\n")
    f.write(f"- Removed: {summary['removed']}\n")
    f.write(f"- IP Changed: {summary['changed']}\n")
    f.write(f"- Total: {summary['total']}\n")

print("done")
EOF

      # =========================
      # commit
      # =========================
      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add tailscale_derp.yaml CHANGELOG.md release_body.txt

          git commit -m "update DERP rules" || exit 0
          git push || true

      # =========================
      # tag (readable)
      # =========================
      - name: Compute tag
        id: tag
        run: |
          HASH=$(sha256sum tailscale_derp.yaml | cut -c1-12)
          DATE=$(date +%Y%m%d)
          TAG="derp-${DATE}-${HASH}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git tag ${{ steps.tag.outputs.tag }} || true
          git push origin ${{ steps.tag.outputs.tag }} || true

      # =========================
      # release (with assets)
      # =========================
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: DERP Update ${{ steps.tag.outputs.tag }}
          body_path: release_body.txt
          files: |
            tailscale_derp.yaml
            CHANGELOG.md
            release_body.txt
