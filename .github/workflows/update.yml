name: Update Tailscale DERP Rules

on:
  schedule:
    - cron: "0 0 * * *"   # 每天 UTC 00:00 自动运行
  workflow_dispatch:       # 允许手动触发

jobs:
  update-derp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Fetch DERP map and update rules
        run: |
          python - <<'EOF'
          import requests, yaml, os
          url = "https://login.tailscale.com/derpmap/default"
          r = requests.get(url)
          derp = r.json()["Regions"]
          rules = {"rules": []}
          for region in derp.values():
              for node in region["Nodes"]:
                  rules["rules"].append({
                      "type": "domain-suffix",
                      "value": node["HostName"],
                      "outbound": "DIRECT"
                  })
          os.makedirs("ruleset", exist_ok=True)
          with open("ruleset/tailscale_derp.yaml", "w") as f:
              yaml.dump(rules, f)
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "Update DERP rules"

      - name: Push changes using PAT
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git push https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }} HEAD:main
