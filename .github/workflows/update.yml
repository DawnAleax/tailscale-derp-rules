name: Update Tailscale DERP Rules

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install deps
        run: pip install requests PyYAML

      - name: Generate DERP
        run: python update_derp.py

      - name: Load previous file
        run: |
          git show HEAD~1:tailscale_derp.yaml > old.yaml || echo "Regions: {}" > old.yaml

      - name: Generate changelog
        run: python generate_changelog.py

      - name: Commit changes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add tailscale_derp.yaml CHANGELOG.md release_body.txt

          git commit -m "update DERP rules" || exit 0
          git push || true

      - name: Compute tag
        id: tag
        run: |
          HASH=$(sha256sum tailscale_derp.yaml | cut -c1-12)
          DATE=$(date +%Y%m%d)
          TAG="derp-${DATE}-${HASH}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git tag ${{ steps.tag.outputs.tag }} || true
          git push origin ${{ steps.tag.outputs.tag }} || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: DERP Update ${{ steps.tag.outputs.tag }}
          body_path: release_body.txt
          files: |
            tailscale_derp.yaml
            CHANGELOG.md
            release_body.txt
