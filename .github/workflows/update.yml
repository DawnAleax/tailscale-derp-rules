name: Update Tailscale DERP Rules

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install deps
        run: pip install requests PyYAML

      - name: Generate DERP rules
        run: python update_derp.py

      - name: Load previous file
        run: |
          git show HEAD~1:tailscale_derp.yaml > old.yaml || echo "payload: []" > old.yaml

      - name: Generate changelog
        run: python .github/scripts/gen_changelog.py

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add tailscale_derp.yaml CHANGELOG.md

          git commit -m "update DERP rules" || exit 0
          git push || true

      - name: Create hash
        id: hash
        run: |
          echo "hash=$(sha256sum tailscale_derp.yaml | cut -c1-12)" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git tag v${{ steps.hash.outputs.hash }} || true
          git push origin v${{ steps.hash.outputs.hash }} || true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.hash.outputs.hash }}
          name: DERP ${{ steps.hash.outputs.hash }}
          body_path: CHANGELOG.md
