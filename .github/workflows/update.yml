name: Update Tailscale DERP Rules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests PyYAML

      - name: Run generator
        run: python update_derp.py

      # =========================
      # 获取旧版本
      # =========================
      - name: Load previous file
        run: |
          git show HEAD~1:tailscale_derp.yaml > old.yaml || echo "Regions: {}" > old.yaml

      # =========================
      # 生成 CHANGELOG + RELEASE META
      # =========================
      - name: Generate changelog
        run: |
          python3 << 'EOF'
import yaml

def load(p):
    try:
        return yaml.safe_load(open(p)) or {}
    except:
        return {}

old = load("old.yaml")
new = load("tailscale_derp.yaml")

# =========================
# KEY: 只用 HostName 做主键（避免 IP 变化误判）
# =========================
def index_by_host(d):
    m = {}
    for r in d.get("Regions", {}).values():
        for n in r.get("Nodes", []):
            host = n.get("HostName")
            if host:
                m[host] = n
    return m

old_map = index_by_host(old)
new_map = index_by_host(new)

old_hosts = set(old_map.keys())
new_hosts = set(new_map.keys())

added_hosts = new_hosts - old_hosts
removed_hosts = old_hosts - new_hosts
common_hosts = old_hosts & new_hosts

# IP变化（仅记录，不算新增/删除）
changed_hosts = []
for h in common_hosts:
    o = old_map[h]
    n = new_map[h]
    if (o.get("IPv4"), o.get("IPv6")) != (n.get("IPv4"), n.get("IPv6")):
        changed_hosts.append(h)

def fmt(hosts, m):
    lines = []
    for h in sorted(hosts):
        n = m[h]
        lines.append(f"- {h} | {n.get('IPv4')} | {n.get('IPv6')}")
    return "\n".join(lines) if lines else "- None"

added_block = fmt(added_hosts, new_map)
removed_block = fmt(removed_hosts, old_map)
changed_block = fmt(changed_hosts, new_map)

summary = {
    "added": len(added_hosts),
    "removed": len(removed_hosts),
    "changed": len(changed_hosts),
    "total": len(new_hosts),
}

with open("CHANGELOG.md", "w") as f:
    f.write("# DERP Update\n\n")
    f.write("## Summary\n")
    f.write(f"- Added: {summary['added']}\n")
    f.write(f"- Removed: {summary['removed']}\n")
    f.write(f"- Changed (IP only): {summary['changed']}\n")
    f.write(f"- Total nodes: {summary['total']}\n\n")

    f.write("## ➕ Added\n")
    f.write(added_block + "\n\n")

    f.write("## ➖ Removed\n")
    f.write(removed_block + "\n\n")

    f.write("## 🔁 IP Changed\n")
    f.write(changed_block + "\n")

# release meta
with open("release_body.txt", "w") as f:
    f.write("DERP Update\n\n")
    f.write("## Summary\n")
    f.write(f"- Added: {summary['added']}\n")
    f.write(f"- Removed: {summary['removed']}\n")
    f.write(f"- IP Changed: {summary['changed']}\n")
    f.write(f"- Total: {summary['total']}\n")

print("done")
EOF

      # =========================
      # commit
      # =========================
      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add tailscale_derp.yaml CHANGELOG.md release_body.txt
          git commit -m "update DERP rules" || exit 0
          git push || true

      # =========================
      # hash
      # =========================
      - name: Compute hash
        id: hash
        run: |
          HASH=$(sha256sum tailscale_derp.yaml | cut -c1-12)
          DATE=$(date +%Y%m%d)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      # =========================
      # tag check
      # =========================
      - name: Check tag
        id: tagcheck
        run: |
          TAG="derp-${{ steps.hash.outputs.date }}-${{ steps.hash.outputs.hash }}"
          git fetch --tags

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # =========================
      # create tag
      # =========================
      - name: Create tag
        if: steps.tagcheck.outputs.exists == 'false'
        run: |
          git tag ${{ steps.tagcheck.outputs.tag }}
          git push origin ${{ steps.tagcheck.outputs.tag }}

      # =========================
      # release
      # =========================
      - name: Create Release
        if: steps.tagcheck.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tagcheck.outputs.tag }}
          name: DERP Update ${{ steps.tagcheck.outputs.tag }}
          body_path: release_body.txt
