name: Update Tailscale DERP Rules

on:
  schedule:
    - cron: "0 3 * * *" # UTC 时间每天 03:00 自动更新
  workflow_dispatch:     # 手动触发也行

jobs:
  update-derp:
    runs-on: ubuntu-latest

    steps:
      # 拉取代码，使用 fork 仓库自带 GITHUB_TOKEN
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 安装 jq（生成脚本用）
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 生成 DERP 规则
      - name: Generate DERP rules
        run: bash scripts/gen_derp_rules.sh

      # 提交并推送
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ruleset/tailscale_derp.yaml
          git commit -m "update derp rules" || echo "no changes"
          git push origin HEAD:main
