name: Update Tailscale DERP Rules

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Generate rules
        run: bash scripts/gen_derp_rules.sh

      - name: Commit changes
        run: |
          git add .
          git commit -m "update derp rules" || echo "no change"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
