name: Update Tailscale DERP Rules

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install deps
        run: pip install requests PyYAML

      - name: Generate DERP
        run: python update_derp.py

      # --- [新增] 编译 MRS 文件的步骤，放在生成 yaml 之后 ---
      - name: Compile to MRS format using Mihomo
        run: |
          # 获取 Mihomo 最新正式版版本号
          VERSION=$(curl -s "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest" | jq -r .tag_name)
          echo "Downloading Mihomo version: $VERSION"
          
          # 下载最新的 Mihomo amd64 内核
          wget -qO mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/$VERSION/mihomo-linux-amd64-$VERSION.gz"
          gunzip mihomo.gz
          chmod +x mihomo
          
          # 调用内核将 yaml 转换为 mrs
          ./mihomo convert-ruleset classical yaml tailscale_derp.yaml tailscale_derp.mrs
      # --------------------------------------------------------

      - name: Load previous file
        run: |
          git show HEAD~1:tailscale_derp.yaml > old.yaml || echo "Regions: {}" > old.yaml

      - name: Generate changelog
        run: python generate_changelog.py

      - name: Commit changes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # [修改] 增加了 tailscale_derp.mrs
          git add tailscale_derp.yaml tailscale_derp.mrs CHANGELOG.md release_body.txt

          # [修改] 更新了 commit message
          git commit -m "update DERP rules and compile MRS" || exit 0
          git push || true

      - name: Compute tag
        id: tag
        run: |
          HASH=$(sha256sum tailscale_derp.yaml | cut -c1-12)
          DATE=$(date +%Y%m%d)
          TAG="derp-${DATE}-${HASH}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git tag ${{ steps.tag.outputs.tag }} || true
          git push origin ${{ steps.tag.outputs.tag }} || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: DERP Update ${{ steps.tag.outputs.tag }}
          body_path: release_body.txt
          files: |
            tailscale_derp.yaml
            tailscale_derp.mrs   # [新增] 将编译好的 .mrs 也作为 Release 的附件发布
            CHANGELOG.md
            release_body.txt
