name: Update Tailscale DERP Rules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests PyYAML

      - name: Run generator
        run: python update_derp.py

      - name: Load previous file
        run: |
          git show HEAD~1:tailscale_derp.yaml > old.yaml || echo "Regions: {}" > old.yaml

      - name: Generate changelog
        run: python .github/scripts/gen_changelog.py

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add tailscale_derp.yaml CHANGELOG.md release_body.txt
          git commit -m "update DERP rules" || exit 0
          git push || true

      - name: Compute hash
        id: hash
        run: |
          HASH=$(sha256sum tailscale_derp.yaml | cut -c1-12)
          DATE=$(date +%Y%m%d)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Check tag
        id: tagcheck
        run: |
          TAG="derp-${{ steps.hash.outputs.date }}-${{ steps.hash.outputs.hash }}"
          git fetch --tags

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create tag
        if: steps.tagcheck.outputs.exists == 'false'
        run: |
          git tag ${{ steps.tagcheck.outputs.tag }}
          git push origin ${{ steps.tagcheck.outputs.tag }}

      - name: Create Release
        if: steps.tagcheck.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tagcheck.outputs.tag }}
          name: DERP Update ${{ steps.tagcheck.outputs.tag }}
          body_path: release_body.txt
