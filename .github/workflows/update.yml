name: Update DERP Rules

on:
  schedule:
    - cron: '0 0 * * *'  # 每天更新一次
  workflow_dispatch:

jobs:
  update-derp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate DERP rules
        run: |
          mkdir -p ruleset
          curl -s https://login.tailscale.com/derpmap/default \
            | jq '.Regions' > ruleset/tailscale_derp.yaml

      - name: Commit changes
        run: |
          git config user.name "DawnAleax"
          git config user.email "wang15188217911@gmail.com"
          git add ruleset/tailscale_derp.yaml
          git diff --cached --quiet || git commit -m "Update DERP rules"

      - name: Push changes
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git push https://x-access-token:${PAT_TOKEN}@github.com/DawnAleax/tailscale-derp-rules.git HEAD:main
