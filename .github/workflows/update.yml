name: Update Tailscale DERP Rules

on:
  schedule:
    - cron: "0 3 * * *"   # 每天 03:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # ✅ 使用内置 token

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Generate DERP rules
        run: bash scripts/gen_derp_rules.sh

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "update derp rules" || echo "no change"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
